<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Дневник</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Caveat:wght@500;600&family=EB+Garamond:ital@0;1&display=swap');

:root{
  --leather-1:#0f2d24;
  --leather-2:#0a1f19;
  --gold:#c6a15b;
  --gold-dim:#9a7d43;
  --paper:#f7efd9;
  --ink:#2b2415;
  --ink-soft:#5b5138;
  --rule:#d9c99a;
  --burgundy:#7a2233;
  --err:#b23a3a;
}
*{box-sizing:border-box;}
body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:radial-gradient(ellipse at center, #2a2420 0%, #14110e 100%);
  font-family:'EB Garamond', serif;
  padding:24px 12px;
}
.stage{ perspective:2400px; width:100%; max-width:920px; }
.scene{ position:relative; width:100%; min-height:70vh; }

/* ---------- closed cover / lock ---------- */
.book-closed{
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  transition:opacity .5s ease .3s, transform .5s ease .3s;
}
.book-closed.hidden{ opacity:0; pointer-events:none; transform:scale(.92); position:absolute; }

.cover{
  position:relative;
  width:min(58%,340px);
  aspect-ratio:3/4;
  border-radius:4px 10px 10px 4px;
  background:linear-gradient(135deg, var(--leather-1), var(--leather-2));
  box-shadow:0 30px 60px rgba(0,0,0,.55), inset -8px 0 20px rgba(0,0,0,.4), inset 0 0 0 1px rgba(198,161,91,.15);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:24px;
  cursor:pointer;
}
.cover::before{
  content:''; position:absolute; inset:14px;
  border:1px solid rgba(198,161,91,.35); border-radius:2px 7px 7px 2px; pointer-events:none;
}
.cover-mark{
  width:52px; height:52px; border:1.5px solid var(--gold-dim); border-radius:50%;
  display:flex; align-items:center; justify-content:center; color:var(--gold);
  font-family:'Playfair Display',serif; font-size:22px; margin-bottom:18px;
}
.cover-title{
  font-family:'Playfair Display', serif; font-weight:700; font-size:clamp(24px,4vw,34px);
  color:var(--gold); letter-spacing:2px; margin:0; text-align:center;
}
.cover-sub{ font-family:'Caveat', cursive; color:var(--gold-dim); font-size:17px; margin:10px 0 0; text-align:center; }

/* pin panel appears over cover */
.pin-panel{
  margin-top:22px; width:100%; display:flex; flex-direction:column; align-items:center; gap:10px;
}
.pin-input{
  width:70%; text-align:center; letter-spacing:8px; font-size:20px;
  background:rgba(247,239,217,.08); border:1px solid var(--gold-dim); color:var(--paper);
  border-radius:6px; padding:8px 10px; font-family:'EB Garamond',serif;
}
.pin-input:focus{ outline:none; border-color:var(--gold); }
.pin-btn{
  background:transparent; border:1px solid var(--gold); color:var(--gold);
  padding:7px 18px; border-radius:5px; font-family:'EB Garamond',serif; font-size:14.5px; cursor:pointer;
}
.pin-btn:hover{ background:rgba(198,161,91,.12); }
.pin-error{ color:#e08a8a; font-size:13px; min-height:16px; }
.pin-hint{ color:var(--gold-dim); font-size:12.5px; opacity:.8; text-align:center; }
.pin-reset{ background:none; border:none; color:var(--gold-dim); font-size:12px; text-decoration:underline; cursor:pointer; margin-top:2px; }

/* ---------- open book ---------- */
.book-open{
  position:absolute; inset:0; display:flex; opacity:0; transform:scale(.96);
  pointer-events:none; transition:opacity .5s ease .3s, transform .5s ease .3s;
}
.book-open.visible{ opacity:1; transform:scale(1); pointer-events:auto; }
.spread{
  position:relative; width:100%; display:flex; border-radius:6px; overflow:hidden;
  box-shadow:0 30px 70px rgba(0,0,0,.55); background:var(--leather-2); padding:14px; gap:2px;
}
.page{
  position:relative; flex:1;
  background:repeating-linear-gradient(transparent, transparent 27px, var(--rule) 28px), var(--paper);
  background-position:0 46px; padding:26px 22px 20px; overflow-y:auto; min-height:0; max-height:78vh;
}
.page-left{ border-radius:3px 0 0 3px; box-shadow:inset -14px 0 24px -14px rgba(0,0,0,.35); }
.page-right{ border-radius:0 3px 3px 0; box-shadow:inset 14px 0 24px -14px rgba(0,0,0,.35); }
.spine-shadow{
  position:absolute; top:14px; bottom:14px; left:50%; width:26px; transform:translateX(-50%);
  background:linear-gradient(90deg, rgba(0,0,0,.18), rgba(0,0,0,0) 40%, rgba(0,0,0,0) 60%, rgba(0,0,0,.18));
  pointer-events:none; z-index:3;
}
.close-tab{
  position:absolute; top:-2px; right:26px; background:var(--burgundy); color:var(--paper);
  font-family:'Caveat',cursive; font-size:15px; padding:6px 14px 8px; border-radius:0 0 6px 6px;
  cursor:pointer; box-shadow:0 3px 6px rgba(0,0,0,.3); z-index:5; border:none;
}
.close-tab:hover{ filter:brightness(1.1); }

.index-head{ font-family:'Playfair Display',serif; font-size:19px; color:var(--ink); margin:0 0 4px; }
.index-rule{ border:none; border-top:1px solid var(--rule); margin:8px 0 14px; }
.entry-list{ list-style:none; margin:0; padding:0; }
.entry-item{ cursor:pointer; padding:6px 4px; border-radius:3px; color:var(--ink-soft); line-height:1.35; }
.entry-item:hover{ background:rgba(122,34,51,.07); }
.entry-item.active{ background:rgba(122,34,51,.12); color:var(--burgundy); }
.entry-date{ font-weight:600; color:var(--ink); font-size:14.5px; display:block; }
.entry-preview{ font-size:13.5px; font-style:italic; opacity:.8; }
.empty-index{ color:var(--ink-soft); font-style:italic; font-size:14.5px; opacity:.75; }
.new-entry-btn{
  margin-top:16px; width:100%; background:transparent; border:1px solid var(--burgundy); color:var(--burgundy);
  font-family:'EB Garamond',serif; font-size:14.5px; padding:8px 10px; border-radius:4px; cursor:pointer;
}
.new-entry-btn:hover{ background:rgba(122,34,51,.08); }

.side-links{ margin-top:22px; padding-top:12px; border-top:1px solid var(--rule); display:flex; flex-direction:column; gap:6px; }
.side-link{ background:none; border:none; color:var(--ink-soft); font-size:12.5px; text-decoration:underline; cursor:pointer; text-align:left; padding:0; }

.rpage-inner{ display:flex; flex-direction:column; min-height:100%; }
.rdate{ font-family:'Playfair Display',serif; font-size:18px; color:var(--ink); margin:0 0 2px; text-transform:capitalize; }
.rweekday{ font-family:'Caveat',cursive; color:var(--ink-soft); font-size:16px; margin:0 0 14px; }
.entry-text{
  flex:1; min-height:140px; border:none; background:transparent; resize:vertical; outline:none;
  font-family:'Caveat', cursive; font-size:20px; line-height:28px; color:var(--ink); width:100%;
}
.entry-text::placeholder{ color:#b7ab84; font-family:'EB Garamond',serif; font-style:italic; font-size:16px; }
.read-text{ font-family:'Caveat', cursive; font-size:20px; line-height:28px; color:var(--ink); white-space:pre-wrap; }

.photo-add-row{ margin-top:10px; }
.photo-grid{ display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
.photo-thumb{ position:relative; width:72px; height:72px; border-radius:5px; overflow:hidden; border:1px solid var(--rule); cursor:pointer; }
.photo-thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
.photo-remove{
  position:absolute; top:2px; right:2px; background:rgba(0,0,0,.55); color:#fff; border:none;
  width:18px; height:18px; border-radius:50%; font-size:11px; line-height:1; cursor:pointer;
}

.rpage-actions{ display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; }
.act-btn{
  background:transparent; border:1px solid var(--gold-dim); color:var(--ink-soft);
  font-family:'EB Garamond',serif; font-size:13.5px; padding:6px 12px; border-radius:4px; cursor:pointer;
}
.act-btn.primary{ border-color:var(--burgundy); color:var(--burgundy); }
.act-btn:hover{ background:rgba(0,0,0,.04); }

.nav-arrows{ display:flex; justify-content:space-between; margin-top:14px; }
.arrow-btn{ background:none; border:none; color:var(--gold-dim); font-family:'Playfair Display',serif; font-size:22px; cursor:pointer; padding:2px 8px; }
.arrow-btn:disabled{ opacity:.25; cursor:default; }
.arrow-btn:hover:not(:disabled){ color:var(--burgundy); }

.turning .page-right{ animation:turn .5s ease; }
@keyframes turn{
  0%{ transform:rotateY(0deg); opacity:1; }
  45%{ transform:rotateY(-8deg); opacity:.5; }
  55%{ transform:rotateY(8deg); opacity:.5; }
  100%{ transform:rotateY(0deg); opacity:1; }
}

.lightbox{
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.85);
  align-items:center; justify-content:center; z-index:50; padding:20px;
}
.lightbox.open{ display:flex; }
.lightbox img{ max-width:100%; max-height:100%; border-radius:4px; }

.storage-note{ color:var(--ink-soft); font-size:11.5px; opacity:.75; margin-top:18px; line-height:1.4; }

@media (max-width:640px){
  .spread{ padding:8px; gap:1px; }
  .page{ padding:14px 12px 14px; font-size:13px; }
  .spine-shadow{ width:14px; }
  .cover-title{ font-size:22px; }
  .entry-text{ font-size:17px; line-height:23px; }
  .read-text{ font-size:17px; line-height:23px; }
  .index-head, .rdate{ font-size:15px; }
}
</style>
</head>
<body>

<div class="stage">
  <div class="scene">

    <div class="book-closed" id="bookClosed">
      <div class="cover" id="coverClick">
        <div class="cover-mark">✒</div>
        <h1 class="cover-title">Дневник</h1>
        <p class="cover-sub" id="coverSub">открой и пиши</p>
        <div class="pin-panel" id="pinPanel" style="display:none;"></div>
      </div>
    </div>

    <div class="book-open" id="bookOpen">
      <div class="spread" id="spread">
        <button class="close-tab" id="closeTab">закрыть</button>
        <div class="page page-left" id="pageLeft"></div>
        <div class="spine-shadow"></div>
        <div class="page page-right" id="pageRight"></div>
      </div>
    </div>

  </div>
</div>

<div class="lightbox" id="lightbox"><img id="lightboxImg" alt=""></div>

<script>
const bookClosed = document.getElementById('bookClosed');
const bookOpen = document.getElementById('bookOpen');
const closeTab = document.getElementById('closeTab');
const pageLeft = document.getElementById('pageLeft');
const pageRight = document.getElementById('pageRight');
const spread = document.getElementById('spread');
const coverClick = document.getElementById('coverClick');
const coverSub = document.getElementById('coverSub');
const pinPanel = document.getElementById('pinPanel');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');

const LS_SALT = 'diary_salt';
const LS_CHECK_IV = 'diary_check_iv';
const LS_CHECK_CT = 'diary_check_ct';
const LS_DATA_IV = 'diary_data_iv';
const LS_DATA_CT = 'diary_data_ct';

let cryptoKey = null;
let entries = [];
let currentId = null;
let pendingPhotos = [];
let editPhotos = null;

function b64FromBytes(bytes){
  let bin=''; const arr=new Uint8Array(bytes);
  for(let i=0;i<arr.length;i++) bin += String.fromCharCode(arr[i]);
  return btoa(bin);
}
function bytesFromB64(b64){
  const bin=atob(b64); const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return bytes;
}
async function deriveKey(pin, saltBytes){
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(pin), {name:'PBKDF2'}, false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt: saltBytes, iterations: 150000, hash:'SHA-256' },
    keyMaterial, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']
  );
}
async function encryptJSON(key, obj){
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const data = new TextEncoder().encode(JSON.stringify(obj));
  const ct = await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, data);
  return { iv: b64FromBytes(iv), ct: b64FromBytes(ct) };
}
async function decryptJSON(key, ivB64, ctB64){
  const iv = bytesFromB64(ivB64);
  const ct = bytesFromB64(ctB64);
  const buf = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
  return JSON.parse(new TextDecoder().decode(buf));
}

function hasCrypto(){ return !!(window.crypto && window.crypto.subtle); }

function showPinError(msg, panelEl){
  const errEl = panelEl.querySelector('.pin-error');
  if(errEl) errEl.textContent = msg || '';
}

function renderCreatePin(){
  coverSub.textContent = 'придумай PIN для доступа';
  pinPanel.style.display = 'flex';
  pinPanel.innerHTML = `
    <input class="pin-input" type="password" inputmode="numeric" maxlength="8" id="pin1" placeholder="новый PIN">
    <input class="pin-input" type="password" inputmode="numeric" maxlength="8" id="pin2" placeholder="повтори PIN">
    <button class="pin-btn" id="createBtn">Создать дневник</button>
    <p class="pin-error" id="pinErr"></p>
    <p class="pin-hint">PIN нужен, чтобы никто другой не смог прочитать записи. Забытый PIN восстановить нельзя.</p>
  `;
  document.getElementById('createBtn').addEventListener('click', async ()=>{
    const p1 = document.getElementById('pin1').value.trim();
    const p2 = document.getElementById('pin2').value.trim();
    const err = document.getElementById('pinErr');
    if(p1.length < 4){ err.textContent = 'PIN — минимум 4 символа'; return; }
    if(p1 !== p2){ err.textContent = 'PIN не совпадает'; return; }
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const key = await deriveKey(p1, salt);
    const check = await encryptJSON(key, {ok:true});
    const data = await encryptJSON(key, {entries:[]});
    localStorage.setItem(LS_SALT, b64FromBytes(salt));
    localStorage.setItem(LS_CHECK_IV, check.iv);
    localStorage.setItem(LS_CHECK_CT, check.ct);
    localStorage.setItem(LS_DATA_IV, data.iv);
    localStorage.setItem(LS_DATA_CT, data.ct);
    cryptoKey = key;
    entries = [];
    openBook();
  });
}

function renderEnterPin(){
  coverSub.textContent = 'введи PIN';
  pinPanel.style.display = 'flex';
  pinPanel.innerHTML = `
    <input class="pin-input" type="password" inputmode="numeric" maxlength="8" id="pinTry" placeholder="PIN">
    <button class="pin-btn" id="unlockBtn">Открыть</button>
    <p class="pin-error" id="pinErr"></p>
    <button class="pin-reset" id="resetBtn">Забыл PIN — начать заново</button>
  `;
  const tryUnlock = async ()=>{
    const pin = document.getElementById('pinTry').value.trim();
    const err = document.getElementById('pinErr');
    if(!pin) return;
    try{
      const salt = bytesFromB64(localStorage.getItem(LS_SALT));
      const key = await deriveKey(pin, salt);
      await decryptJSON(key, localStorage.getItem(LS_CHECK_IV), localStorage.getItem(LS_CHECK_CT));
      const data = await decryptJSON(key, localStorage.getItem(LS_DATA_IV), localStorage.getItem(LS_DATA_CT));
      cryptoKey = key;
      entries = data.entries || [];
      openBook();
    }catch(e){
      err.textContent = 'Неверный PIN';
    }
  };
  document.getElementById('unlockBtn').addEventListener('click', tryUnlock);
  document.getElementById('pinTry').addEventListener('keydown', e=>{ if(e.key==='Enter') tryUnlock(); });
  document.getElementById('resetBtn').addEventListener('click', ()=>{
    if(confirm('Все записи на этом устройстве будут удалены без возможности восстановления. Продолжить?')){
      [LS_SALT,LS_CHECK_IV,LS_CHECK_CT,LS_DATA_IV,LS_DATA_CT].forEach(k=>localStorage.removeItem(k));
      renderCreatePin();
    }
  });
}

coverClick.addEventListener('click', ()=>{
  if(pinPanel.style.display === 'flex') return;
  if(!hasCrypto()){
    coverSub.textContent = 'этот браузер не поддерживает защищённое хранение — открой файл через сайт, а не напрямую';
    return;
  }
  if(localStorage.getItem(LS_SALT)){
    renderEnterPin();
  } else {
    renderCreatePin();
  }
});

function openBook(){
  bookClosed.classList.add('hidden');
  bookOpen.classList.add('visible');
  renderAll();
}
closeTab.addEventListener('click', ()=>{
  bookOpen.classList.remove('visible');
  bookClosed.classList.remove('hidden');
  pinPanel.style.display = 'none';
  pinPanel.innerHTML = '';
  coverSub.textContent = 'открой и пиши';
});

async function saveEntries(){
  const data = await encryptJSON(cryptoKey, {entries});
  localStorage.setItem(LS_DATA_IV, data.iv);
  localStorage.setItem(LS_DATA_CT, data.ct);
}

function uid(){ return 'e' + Date.now() + Math.random().toString(36).slice(2,7); }

function compressImage(file, maxDim=1000, quality=0.72){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let {width,height} = img;
        if(width>height && width>maxDim){ height*=maxDim/width; width=maxDim; }
        else if(height>=width && height>maxDim){ width*=maxDim/height; height=maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width=Math.round(width); canvas.height=Math.round(height);
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function fmtDate(iso){
  const d = new Date(iso);
  const date = d.toLocaleDateString('ru-RU', { day:'numeric', month:'long', year:'numeric' });
  const weekday = d.toLocaleDateString('ru-RU', { weekday:'long' });
  return { date, weekday };
}
function sortedEntries(){ return [...entries].sort((a,b)=> new Date(b.date) - new Date(a.date)); }
function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function renderLeft(){
  const list = sortedEntries();
  const itemsHtml = list.length === 0
    ? `<p class="empty-index">Здесь появятся твои записи.</p>`
    : `<ul class="entry-list">${list.map(e=>{
        const { date } = fmtDate(e.date);
        const preview = (e.text || '').trim().slice(0,40).replace(/\n/g,' ');
        const photoTag = (e.photos && e.photos.length) ? ' 📎' : '';
        return `<li class="entry-item ${e.id===currentId?'active':''}" data-id="${e.id}">
          <span class="entry-date">${date}${photoTag}</span>
          <span class="entry-preview">${preview ? escapeHtml(preview) + (e.text.length>40?'…':'') : 'без текста'}</span>
        </li>`;
      }).join('')}</ul>`;
  pageLeft.innerHTML = `
    <h2 class="index-head">Оглавление</h2>
    <hr class="index-rule"/>
    ${itemsHtml}
    <button class="new-entry-btn" id="newBtn">+ Новая запись</button>
    <div class="side-links">
      <button class="side-link" id="exportBtn">Скачать резервную копию</button>
      <label class="side-link" style="cursor:pointer;">Восстановить из файла
        <input type="file" id="importInput" accept="application/json" style="display:none;">
      </label>
    </div>
    <p class="storage-note">Записи хранятся только в этом браузере на этом устройстве, в зашифрованном виде. Без PIN их не прочитать — в том числе и тебе, если PIN забыт.</p>
  `;
  document.getElementById('newBtn').addEventListener('click', ()=>{ currentId=null; pendingPhotos=[]; renderAll(); });
  pageLeft.querySelectorAll('.entry-item').forEach(el=>{
    el.addEventListener('click', ()=>{ currentId = el.dataset.id; turnPage(renderAll); });
  });
  document.getElementById('exportBtn').addEventListener('click', ()=>{
    const blob = new Blob([JSON.stringify({entries}, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'diary-backup-' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
  });
  document.getElementById('importInput').addEventListener('change', async (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    try{
      const text = await file.text();
      const parsed = JSON.parse(text);
      if(!parsed.entries) throw new Error('bad file');
      if(confirm('Заменить текущие записи содержимым файла?')){
        entries = parsed.entries;
        currentId = null;
        await saveEntries();
        renderAll();
      }
    }catch(err){
      alert('Не удалось прочитать файл резервной копии.');
    }
  });
}

function photoGridHtml(photos, removable){
  if(!photos || !photos.length) return '';
  return `<div class="photo-grid">${photos.map((src,i)=>`
    <div class="photo-thumb" data-idx="${i}">
      <img src="${src}" alt="фото">
      ${removable ? `<button class="photo-remove" data-remove="${i}">×</button>` : ''}
    </div>`).join('')}</div>`;
}

function wirePhotoGrid(container, photosArrRef, onChange){
  container.querySelectorAll('.photo-thumb').forEach(el=>{
    el.addEventListener('click', (e)=>{
      if(e.target.dataset.remove !== undefined && e.target.hasAttribute('data-remove')) return;
      const idx = +el.dataset.idx;
      lightboxImg.src = photosArrRef()[idx];
      lightbox.classList.add('open');
    });
  });
  container.querySelectorAll('[data-remove]').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      const idx = +btn.dataset.remove;
      photosArrRef().splice(idx,1);
      onChange();
    });
  });
}
lightbox.addEventListener('click', ()=> lightbox.classList.remove('open'));

function renderRight(){
  const list = sortedEntries();
  if(currentId === null){
    const today = new Date();
    const { date, weekday } = fmtDate(today.toISOString());
    pageRight.innerHTML = `
      <div class="rpage-inner">
        <p class="rdate">${date}</p>
        <p class="rweekday">${weekday}</p>
        <textarea class="entry-text" id="newText" placeholder="О чём хочешь написать сегодня?"></textarea>
        <div class="photo-add-row">
          <input type="file" id="newPhotoInput" accept="image/*" multiple style="display:none;">
          <button class="act-btn" id="addPhotoBtn" type="button">+ фото</button>
          <div id="newPhotoGrid">${photoGridHtml(pendingPhotos, true)}</div>
        </div>
        <div class="rpage-actions">
          <button class="act-btn primary" id="saveBtn">Сохранить запись</button>
        </div>
      </div>
    `;
    const refreshNewGrid = ()=>{
      document.getElementById('newPhotoGrid').innerHTML = photoGridHtml(pendingPhotos, true);
      wirePhotoGrid(document.getElementById('newPhotoGrid'), ()=>pendingPhotos, refreshNewGrid);
    };
    wirePhotoGrid(document.getElementById('newPhotoGrid'), ()=>pendingPhotos, refreshNewGrid);
    document.getElementById('addPhotoBtn').addEventListener('click', ()=> document.getElementById('newPhotoInput').click());
    document.getElementById('newPhotoInput').addEventListener('change', async (e)=>{
      for(const f of e.target.files){
        try{ pendingPhotos.push(await compressImage(f)); }catch(err){}
      }
      refreshNewGrid();
    });
    document.getElementById('saveBtn').addEventListener('click', async ()=>{
      const text = document.getElementById('newText').value.trim();
      if(!text && pendingPhotos.length===0) return;
      const entry = { id: uid(), date: new Date().toISOString(), text, photos: pendingPhotos };
      entries.push(entry);
      currentId = entry.id;
      pendingPhotos = [];
      await saveEntries();
      renderAll();
    });
  } else {
    const entry = entries.find(e=>e.id===currentId);
    if(!entry){ currentId = null; renderRight(); return; }
    const { date, weekday } = fmtDate(entry.date);
    const idx = list.findIndex(e=>e.id===currentId);
    const prevEntry = list[idx+1];
    const nextEntry = list[idx-1];
    pageRight.innerHTML = `
      <div class="rpage-inner">
        <p class="rdate">${date}</p>
        <p class="rweekday">${weekday}</p>
        <div class="read-text" id="readText">${escapeHtml(entry.text)}</div>
        <div id="readPhotoGrid">${photoGridHtml(entry.photos, false)}</div>
        <div class="rpage-actions">
          <button class="act-btn" id="editBtn">Редактировать</button>
          <button class="act-btn" id="delBtn">Удалить</button>
        </div>
        <div class="nav-arrows">
          <button class="arrow-btn" id="prevBtn" ${prevEntry?'':'disabled'}>‹ раньше</button>
          <button class="arrow-btn" id="nextBtn" ${nextEntry?'':'disabled'}>позже ›</button>
        </div>
      </div>
    `;
    wirePhotoGrid(document.getElementById('readPhotoGrid'), ()=>entry.photos||[], ()=>{});
    document.getElementById('editBtn').addEventListener('click', ()=>{
      editPhotos = (entry.photos || []).slice();
      const inner = pageRight.querySelector('.rpage-inner');
      inner.innerHTML = `
        <p class="rdate">${date}</p>
        <p class="rweekday">${weekday}</p>
        <textarea class="entry-text" id="editText">${entry.text}</textarea>
        <div class="photo-add-row">
          <input type="file" id="editPhotoInput" accept="image/*" multiple style="display:none;">
          <button class="act-btn" id="editAddPhotoBtn" type="button">+ фото</button>
          <div id="editPhotoGrid">${photoGridHtml(editPhotos, true)}</div>
        </div>
        <div class="rpage-actions">
          <button class="act-btn primary" id="saveEditBtn">Сохранить</button>
        </div>
      `;
      const refreshEditGrid = ()=>{
        document.getElementById('editPhotoGrid').innerHTML = photoGridHtml(editPhotos, true);
        wirePhotoGrid(document.getElementById('editPhotoGrid'), ()=>editPhotos, refreshEditGrid);
      };
      wirePhotoGrid(document.getElementById('editPhotoGrid'), ()=>editPhotos, refreshEditGrid);
      document.getElementById('editAddPhotoBtn').addEventListener('click', ()=> document.getElementById('editPhotoInput').click());
      document.getElementById('editPhotoInput').addEventListener('change', async (e)=>{
        for(const f of e.target.files){
          try{ editPhotos.push(await compressImage(f)); }catch(err){}
        }
        refreshEditGrid();
      });
      document.getElementById('saveEditBtn').addEventListener('click', async ()=>{
        const val = document.getElementById('editText').value.trim();
        entry.text = val;
        entry.photos = editPhotos;
        await saveEntries();
        renderAll();
      });
    });
    document.getElementById('delBtn').addEventListener('click', async ()=>{
      if(!confirm('Удалить эту запись без возможности восстановления?')) return;
      entries = entries.filter(e=>e.id!==currentId);
      currentId = null;
      await saveEntries();
      renderAll();
    });
    if(prevEntry) document.getElementById('prevBtn').addEventListener('click', ()=>{ currentId=prevEntry.id; turnPage(renderAll); });
    if(nextEntry) document.getElementById('nextBtn').addEventListener('click', ()=>{ currentId=nextEntry.id; turnPage(renderAll); });
  }
}

function turnPage(cb){
  spread.classList.add('turning');
  setTimeout(()=>{ cb(); spread.classList.remove('turning'); }, 250);
}
function renderAll(){ renderLeft(); renderRight(); }
</script>
</body>
</html>
