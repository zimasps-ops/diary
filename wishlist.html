<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Вишлист</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Caveat:wght@500;600&family=EB+Garamond:ital@0;1&display=swap');

:root{
  --leather-1:#3a1f2d;
  --leather-2:#2a1520;
  --gold:#c6a15b;
  --gold-dim:#9a7d43;
  --paper:#f7efd9;
  --ink:#2b2415;
  --ink-soft:#5b5138;
  --rule:#d9c99a;
  --burgundy:#7a2233;
  --green:#3d6b4f;
}
*{box-sizing:border-box;}
body{
  margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:radial-gradient(ellipse at center, #2a2420 0%, #14110e 100%);
  font-family:'EB Garamond', serif; padding:24px 12px;
}
.stage{ perspective:2400px; width:100%; max-width:920px; }
.scene{ position:relative; width:100%; min-height:70vh; }

.book-closed{
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  transition:opacity .5s ease .3s, transform .5s ease .3s;
}
.book-closed.hidden{ opacity:0; pointer-events:none; transform:scale(.92); position:absolute; }

.cover{
  position:relative; width:min(58%,340px); aspect-ratio:3/4;
  border-radius:4px 10px 10px 4px;
  background:linear-gradient(135deg, var(--leather-1), var(--leather-2));
  box-shadow:0 30px 60px rgba(0,0,0,.55), inset -8px 0 20px rgba(0,0,0,.4), inset 0 0 0 1px rgba(198,161,91,.15);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:24px; cursor:pointer; overflow:hidden;
}
.cover::before{
  content:''; position:absolute; inset:14px;
  border:1px solid rgba(198,161,91,.35); border-radius:2px 7px 7px 2px; pointer-events:none;
}
.cover-mark{
  width:52px; height:52px; border:1.5px solid var(--gold-dim); border-radius:50%;
  display:flex; align-items:center; justify-content:center; color:var(--gold);
  font-family:'Playfair Display',serif; font-size:22px; margin-bottom:18px;
}
.cover-title{
  font-family:'Playfair Display', serif; font-weight:700; font-size:clamp(24px,4vw,34px);
  color:var(--gold); letter-spacing:2px; margin:0; text-align:center;
}
.cover-sub{ font-family:'Caveat', cursive; color:var(--gold-dim); font-size:17px; margin:10px 0 0; text-align:center; }

.pin-panel{ margin-top:22px; width:100%; display:flex; flex-direction:column; align-items:center; gap:10px; }
.pin-input{
  width:75%; text-align:center; font-size:16px;
  background:rgba(247,239,217,.08); border:1px solid var(--gold-dim); color:var(--paper);
  border-radius:6px; padding:8px 10px; font-family:'EB Garamond',serif;
}
.pin-input:focus{ outline:none; border-color:var(--gold); }
.pin-btn{
  background:transparent; border:1px solid var(--gold); color:var(--gold);
  padding:7px 18px; border-radius:5px; font-family:'EB Garamond',serif; font-size:14.5px; cursor:pointer;
}
.pin-btn:hover{ background:rgba(198,161,91,.12); }
.pin-error{ color:#e08a8a; font-size:13px; min-height:16px; text-align:center; }
.pin-hint{ color:var(--gold-dim); font-size:12.5px; opacity:.85; text-align:center; max-width:85%; }
.pin-link{ background:none; border:none; color:var(--gold-dim); font-size:12.5px; text-decoration:underline; cursor:pointer; margin-top:4px; }

.book-open{
  position:absolute; inset:0; display:flex; opacity:0; transform:scale(.96);
  pointer-events:none; transition:opacity .5s ease .3s, transform .5s ease .3s;
}
.book-open.visible{ opacity:1; transform:scale(1); pointer-events:auto; }
.spread{
  position:relative; width:100%; display:flex; border-radius:6px; overflow:hidden;
  box-shadow:0 30px 70px rgba(0,0,0,.55); background:var(--leather-2); padding:14px; gap:2px;
}
.page{
  position:relative; flex:1;
  background:repeating-linear-gradient(transparent, transparent 27px, var(--rule) 28px), var(--paper);
  background-position:0 46px; padding:26px 22px 20px; overflow-y:auto; min-height:0; max-height:78vh;
}
.page-left{ border-radius:3px 0 0 3px; box-shadow:inset -14px 0 24px -14px rgba(0,0,0,.35); }
.page-right{ border-radius:0 3px 3px 0; box-shadow:inset 14px 0 24px -14px rgba(0,0,0,.35); }
.spine-shadow{
  position:absolute; top:14px; bottom:14px; left:50%; width:26px; transform:translateX(-50%);
  background:linear-gradient(90deg, rgba(0,0,0,.18), rgba(0,0,0,0) 40%, rgba(0,0,0,0) 60%, rgba(0,0,0,.18));
  pointer-events:none; z-index:3;
}
.close-tab{
  position:absolute; top:-2px; right:26px; background:var(--burgundy); color:var(--paper);
  font-family:'Caveat',cursive; font-size:15px; padding:6px 14px 8px; border-radius:0 0 6px 6px;
  cursor:pointer; box-shadow:0 3px 6px rgba(0,0,0,.3); z-index:5; border:none;
}
.close-tab:hover{ filter:brightness(1.1); }

.index-head{ font-family:'Playfair Display',serif; font-size:19px; color:var(--ink); margin:0 0 4px; }
.index-sub{ font-family:'Caveat',cursive; font-size:15px; color:var(--ink-soft); margin:0 0 10px; }
.index-rule{ border:none; border-top:1px solid var(--rule); margin:8px 0 14px; }

.item-card{
  border:1px solid var(--rule); border-radius:6px; padding:10px 12px; margin-bottom:10px; background:rgba(255,255,255,.35);
}
.item-title{ font-family:'Playfair Display',serif; font-size:15.5px; color:var(--ink); margin:0 0 3px; }
.item-meta{ font-size:13px; color:var(--ink-soft); margin:0 0 3px; }
.item-note{ font-size:13px; font-style:italic; color:var(--ink-soft); margin:0 0 6px; }
.item-link{ font-size:12.5px; color:var(--burgundy); word-break:break-all; }
.item-actions{ display:flex; gap:8px; margin-top:6px; flex-wrap:wrap; }
.item-btn{
  background:transparent; border:1px solid var(--gold-dim); color:var(--ink-soft);
  font-family:'EB Garamond',serif; font-size:12.5px; padding:4px 10px; border-radius:4px; cursor:pointer;
}
.item-btn:hover{ background:rgba(0,0,0,.04); }
.item-btn.reserved{ border-color:var(--green); color:var(--green); }
.item-btn.danger{ border-color:var(--burgundy); color:var(--burgundy); }

.new-entry-btn{
  margin-top:6px; width:100%; background:transparent; border:1px solid var(--burgundy); color:var(--burgundy);
  font-family:'EB Garamond',serif; font-size:14.5px; padding:8px 10px; border-radius:4px; cursor:pointer;
}
.new-entry-btn:hover{ background:rgba(122,34,51,.08); }

.side-links{ margin-top:18px; padding-top:12px; border-top:1px solid var(--rule); display:flex; flex-direction:column; gap:6px; }
.side-link{ background:none; border:none; color:var(--ink-soft); font-size:12.5px; text-decoration:underline; cursor:pointer; text-align:left; padding:0; }
.storage-note{ color:var(--ink-soft); font-size:11.5px; opacity:.75; margin-top:18px; line-height:1.4; }

.rpage-inner{ display:flex; flex-direction:column; min-height:100%; }
.rdate{ font-family:'Playfair Display',serif; font-size:18px; color:var(--ink); margin:0 0 12px; }
.field-label{ font-size:12.5px; color:var(--ink-soft); margin:10px 0 3px; }
.field-input{
  width:100%; border:1px solid var(--rule); border-radius:5px; padding:7px 9px;
  font-family:'EB Garamond',serif; font-size:14.5px; color:var(--ink); background:rgba(255,255,255,.5);
}
.field-input:focus{ outline:none; border-color:var(--gold-dim); }
.rpage-actions{ display:flex; gap:10px; margin-top:16px; flex-wrap:wrap; }
.act-btn{
  background:transparent; border:1px solid var(--gold-dim); color:var(--ink-soft);
  font-family:'EB Garamond',serif; font-size:13.5px; padding:6px 12px; border-radius:4px; cursor:pointer;
}
.act-btn.primary{ border-color:var(--burgundy); color:var(--burgundy); }
.act-btn:hover{ background:rgba(0,0,0,.04); }
.help-text{ font-size:14px; line-height:1.55; color:var(--ink-soft); }
.help-text p{ margin:0 0 12px; }
.help-text strong{ color:var(--ink); }

@media (max-width:640px){
  .spread{ padding:8px; gap:1px; }
  .page{ padding:14px 12px 14px; font-size:13px; }
  .spine-shadow{ width:14px; }
  .cover-title{ font-size:22px; }
}
</style>
</head>
<body>

<div class="stage">
  <div class="scene">
    <div class="book-closed" id="bookClosed">
      <div class="cover" id="coverClick">
        <div class="cover-mark">🎁</div>
        <h1 class="cover-title">Вишлист</h1>
        <p class="cover-sub" id="coverSub">загляни или подари</p>
        <div class="pin-panel" id="pinPanel" style="display:none;"></div>
      </div>
    </div>
    <div class="book-open" id="bookOpen">
      <div class="spread" id="spread">
        <button class="close-tab" id="closeTab">закрыть</button>
        <div class="page page-left" id="pageLeft"></div>
        <div class="spine-shadow"></div>
        <div class="page page-right" id="pageRight"></div>
      </div>
    </div>
  </div>
</div>

<script>
const bookClosed = document.getElementById('bookClosed');
const bookOpen = document.getElementById('bookOpen');
const closeTab = document.getElementById('closeTab');
const pageLeft = document.getElementById('pageLeft');
const pageRight = document.getElementById('pageRight');
const spread = document.getElementById('spread');
const coverClick = document.getElementById('coverClick');
const coverSub = document.getElementById('coverSub');
const pinPanel = document.getElementById('pinPanel');

// ==== адрес твоего wishlist-воркера ====
const API_BASE = 'https://wishlist-sync.zimasps.workers.dev';
// ==== полный адрес самой этой страницы (для кнопки "скопировать ссылку") ====
const PAGE_URL = 'https://zimasps-ops.github.io/diary/wishlist.html';

let items = [];
let viewingUser = '';
let isOwner = false;
let ownerPin = '';
let rightMode = 'help'; // 'help' | 'add' | 'edit'
let editingId = null;

function uid(){ return 'i' + Date.now() + Math.random().toString(36).slice(2,7); }
function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function extractUrl(text){
  if(!text) return null;
  const match = text.match(/https?:\/\/[^\s"'<>]+/i);
  return match ? match[0] : null;
}

async function apiGet(path){
  const res = await fetch(`${API_BASE}${path}`);
  const data = await res.json().catch(()=>({}));
  if(!res.ok) throw { status: res.status, data };
  return data;
}
async function apiPost(path, body){
  const res = await fetch(`${API_BASE}${path}`, {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
  });
  const data = await res.json().catch(()=>({}));
  if(!res.ok) throw { status: res.status, data };
  return data;
}

function openBook(){
  bookClosed.classList.add('hidden');
  bookOpen.classList.add('visible');
  rightMode = isOwner ? 'add' : 'help';
  renderAll();
}
closeTab.addEventListener('click', ()=>{
  bookOpen.classList.remove('visible');
  bookClosed.classList.remove('hidden');
  pinPanel.style.display = 'none';
  pinPanel.innerHTML = '';
  coverSub.textContent = 'загляни или подари';
  isOwner = false; ownerPin=''; viewingUser=''; items=[];
});

// ---- вход: просмотр чужого списка или логин владельца ----
function renderViewForm(){
  coverSub.textContent = 'чей вишлист посмотреть?';
  pinPanel.style.display = 'flex';
  pinPanel.innerHTML = `
    <input class="pin-input" type="text" autocapitalize="off" autocorrect="off" id="viewUser" placeholder="логин">
    <button class="pin-btn" id="viewBtn">Смотреть</button>
    <p class="pin-error" id="pinErr"></p>
    <button class="pin-link" id="ownerLink">Это мой вишлист — войти</button>
  `;
  const goView = async ()=>{
    const user = document.getElementById('viewUser').value.trim().toLowerCase();
    const err = document.getElementById('pinErr');
    if(!user){ err.textContent = 'Введи логин'; return; }
    err.textContent = 'Загружаю…';
    try{
      const data = await apiGet(`/wishlist?user=${encodeURIComponent(user)}`);
      viewingUser = user; isOwner = false; items = data.items || [];
      openBook();
    }catch(e){
      err.textContent = e.status === 404 ? 'Такого вишлиста не нашлось' : 'Не удалось загрузить, проверь интернет';
    }
  };
  document.getElementById('viewBtn').addEventListener('click', goView);
  document.getElementById('viewUser').addEventListener('keydown', e=>{ if(e.key==='Enter') goView(); });
  document.getElementById('ownerLink').addEventListener('click', renderOwnerLogin);
}

function renderOwnerLogin(){
  coverSub.textContent = 'войди или создай свой вишлист';
  pinPanel.innerHTML = `
    <input class="pin-input" type="text" autocapitalize="off" autocorrect="off" id="loginUser" placeholder="логин">
    <input class="pin-input" type="password" id="loginPin" placeholder="PIN">
    <button class="pin-btn" id="loginBtn">Войти</button>
    <p class="pin-error" id="pinErr"></p>
    <button class="pin-link" id="backLink">← Посмотреть чужой вишлист</button>
  `;
  const tryLogin = async ()=>{
    const user = document.getElementById('loginUser').value.trim().toLowerCase();
    const pin = document.getElementById('loginPin').value.trim();
    const err = document.getElementById('pinErr');
    if(!user || pin.length < 4){ err.textContent = 'Логин и PIN (мин. 4 символа)'; return; }
    err.textContent = 'Проверяю…';
    try{
      const data = await apiPost('/wishlist/login', { user, pin });
      viewingUser = user; isOwner = true; ownerPin = pin; items = data.items || [];
      openBook();
    }catch(e){
      if(e.status === 404){
        renderConfirmCreate(user, pin);
      } else if(e.status === 401){
        err.textContent = 'Неверный PIN';
      } else {
        err.textContent = 'Не удалось подключиться, проверь интернет';
      }
    }
  };
  document.getElementById('loginBtn').addEventListener('click', tryLogin);
  pinPanel.querySelectorAll('.pin-input').forEach(inp=>{
    inp.addEventListener('keydown', e=>{ if(e.key==='Enter') tryLogin(); });
  });
  document.getElementById('backLink').addEventListener('click', renderViewForm);
}

function renderConfirmCreate(user, pin){
  coverSub.textContent = 'такого логина ещё нет';
  pinPanel.innerHTML = `
    <p class="pin-hint">Логин «${escapeHtml(user)}» свободен — создадим с ним новый вишлист. Введи PIN ещё раз для подтверждения.</p>
    <input class="pin-input" type="password" id="pinConfirm" placeholder="повтори PIN">
    <button class="pin-btn" id="confirmBtn">Создать вишлист</button>
    <button class="pin-link" id="backBtn">Назад</button>
    <p class="pin-error" id="pinErr"></p>
  `;
  document.getElementById('confirmBtn').addEventListener('click', async ()=>{
    const err = document.getElementById('pinErr');
    const pin2 = document.getElementById('pinConfirm').value.trim();
    if(pin2 !== pin){ err.textContent = 'PIN не совпадает'; return; }
    err.textContent = 'Создаю…';
    try{
      await apiPost('/wishlist/create', { user, pin });
      viewingUser = user; isOwner = true; ownerPin = pin; items = [];
      openBook();
    }catch(e){
      err.textContent = 'Не удалось подключиться, проверь интернет';
    }
  });
  document.getElementById('backBtn').addEventListener('click', renderOwnerLogin);
}

coverClick.addEventListener('click', ()=>{
  if(pinPanel.style.display === 'flex') return;
  renderViewForm();
});

// ---- автозагрузка по ссылке ?user=имя ----
window.addEventListener('DOMContentLoaded', async ()=>{
  const params = new URLSearchParams(location.search);
  const u = (params.get('user') || '').trim().toLowerCase();
  if(u){
    try{
      const data = await apiGet(`/wishlist?user=${encodeURIComponent(u)}`);
      viewingUser = u; isOwner = false; items = data.items || [];
      openBook();
    }catch(e){ /* просто покажем обложку как обычно */ }
  }
});

// ---- рендер книги ----
async function saveItems(){
  await apiPost('/wishlist/save', { user: viewingUser, pin: ownerPin, items });
}

function renderLeft(){
  const itemsHtml = items.length === 0
    ? `<p class="pin-hint" style="text-align:left;color:var(--ink-soft);">Список пока пуст.</p>`
    : items.map(it=>{
        const meta = [it.price, it.link ? '' : ''].filter(Boolean).join(' · ');
        const foundUrl = extractUrl(it.link);
        const linkHtml = foundUrl ? `<div class="item-link"><a href="${escapeHtml(foundUrl)}" target="_blank" rel="noopener">${escapeHtml(it.link)}</a></div>` : (it.link ? `<div class="item-link">${escapeHtml(it.link)}</div>` : '');
        if(isOwner){
          return `<div class="item-card">
            <p class="item-title">${escapeHtml(it.title)}</p>
            ${it.price ? `<p class="item-meta">${escapeHtml(it.price)}</p>` : ''}
            ${it.note ? `<p class="item-note">${escapeHtml(it.note)}</p>` : ''}
            ${linkHtml}
            <div class="item-actions">
              <button class="item-btn" data-edit="${it.id}">Изменить</button>
              <button class="item-btn danger" data-del="${it.id}">Удалить</button>
            </div>
          </div>`;
        } else {
          return `<div class="item-card">
            <p class="item-title">${escapeHtml(it.title)}</p>
            ${it.price ? `<p class="item-meta">${escapeHtml(it.price)}</p>` : ''}
            ${it.note ? `<p class="item-note">${escapeHtml(it.note)}</p>` : ''}
            ${linkHtml}
            <div class="item-actions">
              <button class="item-btn ${it.reserved?'reserved':''}" data-reserve="${it.id}">${it.reserved ? '✓ Уже дарю' : 'Хочу подарить'}</button>
            </div>
          </div>`;
        }
      }).join('');

  pageLeft.innerHTML = `
    <h2 class="index-head">${isOwner ? 'Мой вишлист' : 'Вишлист «' + escapeHtml(viewingUser) + '»'}</h2>
    <p class="index-sub">${isOwner ? 'логин: ' + escapeHtml(viewingUser) : 'нажми «хочу подарить», чтобы отметить пункт — владелец этого не увидит'}</p>
    <hr class="index-rule"/>
    ${itemsHtml}
    ${isOwner ? `<button class="new-entry-btn" id="newItemBtn">+ Добавить пункт</button>` : ''}
    ${isOwner ? `
    <div class="side-links">
      <button class="side-link" id="shareBtn">Скопировать ссылку для друзей</button>
      <button class="side-link" id="helpBtn">Как это работает</button>
    </div>` : ''}
    <p class="storage-note">${isOwner ? 'Список виден всем, у кого есть твоя ссылка или логин. PIN нужен только для редактирования.' : 'Отметка «хочу подарить» видна другим гостям, но не владельцу списка — это честная система, основанная на доверии, а не техническая тайна.'}</p>
  `;

  if(isOwner){
    document.getElementById('newItemBtn').addEventListener('click', ()=>{ rightMode='add'; editingId=null; renderRight(); });
    document.getElementById('shareBtn').addEventListener('click', ()=>{
      const link = `${PAGE_URL}?user=${encodeURIComponent(viewingUser)}`;
      navigator.clipboard?.writeText(link);
      alert('Ссылка скопирована:\n' + link);
    });
    document.getElementById('helpBtn').addEventListener('click', ()=>{ rightMode='help'; renderRight(); });
    pageLeft.querySelectorAll('[data-edit]').forEach(btn=>{
      btn.addEventListener('click', ()=>{ editingId = btn.dataset.edit; rightMode='add'; renderRight(); });
    });
    pageLeft.querySelectorAll('[data-del]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        if(!confirm('Удалить этот пункт?')) return;
        items = items.filter(i=>i.id!==btn.dataset.del);
        await saveItems();
        renderAll();
      });
    });
  } else {
    pageLeft.querySelectorAll('[data-reserve]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const it = items.find(i=>i.id===btn.dataset.reserve);
        it.reserved = !it.reserved;
        try{
          await apiPost('/wishlist/reserve', { user: viewingUser, itemId: it.id, reserved: it.reserved });
        }catch(e){}
        renderLeft();
      });
    });
  }
}

function renderRight(){
  if(!isOwner || rightMode === 'help'){
    pageRight.innerHTML = `
      <div class="rpage-inner">
        <p class="rdate">Как это работает</p>
        <div class="help-text">
          <p><strong>Просмотр открыт для всех.</strong> Любой, у кого есть твой логин или ссылка, может увидеть список — PIN для этого не нужен.</p>
          <p><strong>PIN только для редактирования.</strong> Добавлять и убирать пункты можешь только ты, войдя логином и PIN.</p>
          <p><strong>«Хочу подарить»</strong> — гости отмечают, что уже берут этот подарок, чтобы не дублировать друг друга. Ты, как владелец, эту отметку не видишь — сюрприз сохраняется.</p>
          <p><strong>Ссылка для друзей</strong> внизу списка сразу открывает твой вишлист, без необходимости вводить логин.</p>
        </div>
      </div>
    `;
    return;
  }
  const editing = editingId ? items.find(i=>i.id===editingId) : null;
  pageRight.innerHTML = `
    <div class="rpage-inner">
      <p class="rdate">${editing ? 'Изменить пункт' : 'Новый пункт'}</p>
      <p class="field-label">Название</p>
      <input class="field-input" id="fTitle" value="${editing ? escapeHtml(editing.title) : ''}" placeholder="Что хочется">
      <p class="field-label">Цена (необязательно)</p>
      <input class="field-input" id="fPrice" value="${editing ? escapeHtml(editing.price||'') : ''}" placeholder="например, 2000 ₽">
      <p class="field-label">Ссылка (необязательно)</p>
      <input class="field-input" id="fLink" value="${editing ? escapeHtml(editing.link||'') : ''}" placeholder="только ссылка, без текста">      <p class="field-label">Заметка (необязательно)</p>
      <input class="field-input" id="fNote" value="${editing ? escapeHtml(editing.note||'') : ''}" placeholder="цвет, размер и т.п.">
      <div class="rpage-actions">
        <button class="act-btn primary" id="saveItemBtn">${editing ? 'Сохранить' : 'Добавить'}</button>
        ${editing ? `<button class="act-btn" id="cancelEditBtn">Отмена</button>` : ''}
      </div>
    </div>
  `;
  document.getElementById('saveItemBtn').addEventListener('click', async ()=>{
    const title = document.getElementById('fTitle').value.trim();
    if(!title) return;
    const price = document.getElementById('fPrice').value.trim();
    const link = document.getElementById('fLink').value.trim();
    const note = document.getElementById('fNote').value.trim();
    if(editing){
      editing.title = title; editing.price = price; editing.link = link; editing.note = note;
    } else {
      items.push({ id: uid(), title, price, link, note, reserved:false });
    }
    await saveItems();
    editingId = null;
    renderAll();
  });
  if(editing){
    document.getElementById('cancelEditBtn').addEventListener('click', ()=>{ editingId=null; renderRight(); });
  }
}

function renderAll(){ renderLeft(); renderRight(); }
</script>
</body>
</html>
